name: ci

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x

      - name: cache-bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'package.json') }}

      - name: install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test --coverage

      - name: scrub
        run: |
          if grep -rn -iE \
            "alexy-os|delta5-hq|quant5-lab|ui8kit|buildy-ui|ui\.buildy\.tw|hinddy/tailwind-builder|ruvnet/ruflo|TauricResearch/TradingAgents|/tmp/donors|@buildy/|@editory/" \
            src/ tests/ README.md CHANGELOG.md package.json SECURITY.md 2>/dev/null; then
            echo "Scrub gate failed: forbidden substring detected"
            exit 1
          fi

      - name: build
        run: bun run build

      - name: determinism-check
        run: |
          mv dist dist-1
          bun run build
          diff -r dist dist-1 || (echo "non-deterministic build" && exit 1)
          rm -rf dist-1

      - name: install-playwright
        run: npx playwright install --with-deps chromium

      - name: e2e
        run: bun run test:e2e

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x

      - name: install
        run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: setup-npm-auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
